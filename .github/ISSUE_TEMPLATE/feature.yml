name: 新機能・機能改善
description: 新しい機能や既存機能の拡張案を記録します
title: "[Feature] "
labels:
  - "type: feature"
  - "status: inbox"
assignees:
  - tomoki013
body:
  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: この機能が必要な理由を書いてください
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 想定している動作や画面を書いてください
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案・現在の対応方法
    validations:
      required: false
  - type: textarea
    id: out_of_scope
    attributes:
      label: 今回の範囲外
    validations:
      required: false
  - type: textarea
    id: completion
    attributes:
      label: 完了条件
      value: |
        - [ ] 仕様を決めた
        - [ ] 実装した
        - [ ] テストした
        - [ ] 本番環境で確認した
    validations:
      required: false
